set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set-option -g window-size latest

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @scroll-down-exit-copy-mode "off"

## Theme
set -g @plugin '2KAbhishek/tmux2k'
set -g @tmux2k-refresh-rate 5

set -g @tmux2k-left-plugins "session uptime"
set -g @tmux2k-right-plugins "cpu ram" # gpu
set -g @tmux2k-cpu-usage-decimal "false"

set -g @tmux2k-window-list-left-sep ''
set -g @tmux2k-window-list-right-sep ''

set -g @tmux2k-theme 'onedark'
set -g @tmux2k-session-colors "light_red text"
set -g @tmux2k-uptime-colors "gray text"
set -g @tmux2k-bg-main 'default'  # transparent bar bg

# Binds
unbind C-b
set -g prefix C-s
bind C-s send-prefix

bind r source ~/.config/tmux/tmux.conf \; display "Reloaded"

# Mouse / copy 
set-option -g mouse on
set-option -g mode-keys emacs
unbind -T copy-mode Escape
bind -T copy-mode Escape send-keys -X clear-selection

set -g set-clipboard on
set -g allow-passthrough on

# OSC 52 clipboard (copy on select + y)
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear \; run-shell -b ~/.config/tmux/scripts/tmux-osc52-copy
bind -T copy-mode y send-keys -X copy-selection-no-clear \; run-shell -b ~/.config/tmux/scripts/tmux-osc52-copy

# Double-click selects word, doesn't exit
bind -T root DoubleClick1Pane "select-pane -t = ; copy-mode ; send-keys -X select-word"
bind -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word

# Triple-click selects line, doesn't exit
bind -T root TripleClick1Pane "select-pane -t = ; copy-mode ; send-keys -X select-line"
bind -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line

#
#
#
#
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
