set -g default-command "bash"

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set-option -g window-size latest
set-option -g history-limit 10000
set -sg escape-time 0

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @scroll-down-exit-copy-mode "off"

## Theme
set -g @plugin '2KAbhishek/tmux2k'
set -g @tmux2k-refresh-rate 15

set -g @tmux2k-left-plugins "session uptime"
set -g @tmux2k-right-plugins "cpu ram" # gpu
set -g @tmux2k-cpu-usage-decimal "false"

set -g @tmux2k-window-list-left-sep ''
set -g @tmux2k-window-list-right-sep ''

set -g @tmux2k-theme 'onedark'
set -g @tmux2k-session-colors "light_red text"
set -g @tmux2k-uptime-colors "gray text"
set -g @tmux2k-bg-main 'default'  # transparent bar bg

# Binds
unbind C-b
set -g prefix C-s
bind C-s send-prefix

bind r source ~/.config/tmux/tmux.conf \; display "Reloaded"

bind s setw synchronize-panes

bind - select-layout even-horizontal
bind = select-layout even-vertical

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Mouse / copy
set-option -g mouse on
set-option -g mode-keys emacs
unbind -T copy-mode Escape
bind -T copy-mode Escape send-keys -X clear-selection

set -g set-clipboard on
set -g allow-passthrough on

# tine pane background in copy-mode
set-hook -g pane-mode-changed 'if -F "#{pane_mode}" "select-pane -P bg=#1a1a2e" "select-pane -P bg=default"'

# pane info
set -g pane-border-status off
set -g pane-border-format ' #{pane_index} #{b:pane_current_path} #{?@last_cmd,$ #{@last_cmd},[#{pane_current_command}]} '
bind i if -F '#{==:#{pane-border-status},off}' 'set -g pane-border-status top' 'set -g pane-border-status off'


# OSC 52 clipboard - copy on sel
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-no-clear ~/.config/tmux/scripts/tmux-osc52-copy
bind -T copy-mode MouseDragEnd1Border send-keys -X copy-pipe-no-clear ~/.config/tmux/scripts/tmux-osc52-copy
bind -T copy-mode y send-keys -X copy-pipe-no-clear ~/.config/tmux/scripts/tmux-osc52-copy

# Double-click selects word, doesn't exit
bind -T root DoubleClick1Pane "select-pane -t = ; copy-mode ; send-keys -X select-word ; send-keys -X copy-pipe-no-clear ~/.config/tmux/scripts/tmux-osc52-copy"
bind -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-no-clear ~/.config/tmux/scripts/tmux-osc52-copy

# Triple-click selects line, doesn't exit
bind -T root TripleClick1Pane "select-pane -t = ; copy-mode ; send-keys -X select-line ; send-keys -X copy-pipe-no-clear ~/.config/tmux/scripts/tmux-osc52-copy"
bind -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-pipe-no-clear ~/.config/tmux/scripts/tmux-osc52-copy


#
#
#
#
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
run-shell '~/.config/tmux/scripts/patch-status.sh'

# sync-panes indicator
set -g window-status-current-format "#{?synchronize-panes,#[fg=#c678fd bg=default]#[bg=#c678fd fg=default] 󰓦 #[fg=#c678fd bg=default],}#[fg=#61afef,bg=default]#[bg=#61afef]#{?window_flags,#[fg=#98c379]#{window_flags},}#[fg=default] #I:#W #[fg=#61afef,bg=default]"
